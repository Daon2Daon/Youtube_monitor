name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치 푸시 시 자동 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # GHCR 푸시 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 별도 설정 불필요, 자동 제공

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/daon2daon/youtube_monitor:latest
            ghcr.io/daon2daon/youtube_monitor:${{ github.sha }}
