services:
  youtube-monitor:
    build: .
    container_name: youtube-monitor-local
    restart: unless-stopped
    ports:
      - "8010:8000"
    volumes:
      - ./data:/app/data
      - ./static:/app/static:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
